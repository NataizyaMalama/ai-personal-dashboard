<!doctype html>
<html>
  <head>
    <title>AI Personal Dashboard</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>AI Personal Dashboard</h1>

      <p>Your personal AI assistant.</p>
    </header>

    <nav>
      <a href="#">Home</a>

      <a href="#">Goals</a>

      <a href="#">Settings</a>
    </nav>

    <main class="dashboard">
      <section class="card">
        <h2>My Goals</h2>

        <p>Track your daily goals here.</p>

        <input id="goalInput" type="text" placeholder="Enter a goal" />

        <button id="addGoalBtn">Add Goal</button>

        <div id="goalList"></div>
      </section>

      <section class="card">
        <h2>AI Summary</h2>

        <p>Your AI-generated insights will appear here.</p>
      </section>

      <section class="card">
        <h2>Latest Updates</h2>

        <p>Personalized information will appear here.</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
